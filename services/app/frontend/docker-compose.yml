services:
  e2e_db_portfolio:
    image: postgres:16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_e2e
    restart: no

  e2e_admin_spring:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://e2e_db_portfolio:5432/portfolio
      DB_USER: portfolio
      DB_PASSWORD: portfolio_e2e
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:?required}
      JWT_ISSUER: portfolio-manager-e2e
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_JTI_HASH_SECRET: ${JWT_JTI_HASH_SECRET:?required}
      LLM_CONFIG_ENCRYPTION_PASSWORD: ${LLM_CONFIG_ENCRYPTION_PASSWORD:-}
    depends_on:
      - e2e_db_portfolio
    networks:
      default:
        aliases:
          - admin_spring
    ports:
      - "127.0.0.1:18089:8080"
    restart: no

  e2e_admin_frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - e2e_admin_spring
    ports:
      - "127.0.0.1:18090:80"
    restart: no
